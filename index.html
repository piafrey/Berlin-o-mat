<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berlin zum Ausflippen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #C84040;
    min-height: 100vh;
    font-family: 'Source Sans 3', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 60px;
  }

  /* ── TITLE ── */
  .title-block {
    text-align: center;
    margin-bottom: 36px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(42px, 7vw, 80px);
    line-height: 1;
    color: #fff;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }

  .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: clamp(14px, 2vw, 20px);
    color: rgba(255,255,255,0.75);
    font-weight: 700;
  }

  /* ── BOARD ── */
  #board {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 920px;
    margin-bottom: 28px;
  }

  .card {
    border-radius: 999px;
    border: 2px dashed rgba(255,255,255,0.45);
    padding: 28px 24px 52px;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    perspective: 900px;
    position: relative;
    transition: filter 0.15s;
  }

  .card:hover { filter: brightness(1.08); }

  .card-0 { background: #5B7B9A; }
  .card-1 { background: #5A8A6A; }
  .card-2 { background: #B8B840; }

  .flip-inner {
    width: 100%;
    transform-style: preserve-3d;
    text-align: center;
  }

  @keyframes flipPage {
    0%   { transform: rotateX(0deg); }
    50%  { transform: rotateX(90deg); }
    51%  { transform: rotateX(-90deg); }
    100% { transform: rotateX(0deg); }
  }

  .flip-inner.flipping { animation: flipPage 0.4s ease-in-out; }

  .card-0 p, .card-1 p { color: #fff; }
  .card-2 p { color: #1a1a1a; }

  .card p {
    font-family: 'Source Sans 3', sans-serif;
    font-size: clamp(18px, 2.2vw, 26px);
    line-height: 1.3;
    font-weight: 500;
  }

  .card-icon {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.45;
    transition: opacity 0.2s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .card:hover .card-icon { opacity: 0.9; }

  .card-0 .card-icon, .card-1 .card-icon { color: rgba(255,255,255,0.9); }
  .card-2 .card-icon { color: rgba(0,0,0,0.5); }

  .card-icon svg { width: 18px; height: 18px; display: block; }

  .card-icon span {
    font-size: 10px;
    font-family: 'Source Sans 3', sans-serif;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    justify-content: center;
    margin-bottom: 48px;
  }

  .btn-shuffle {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    font-weight: 500;
    background: #fff;
    border: none;
    color: #C84040;
    padding: 12px 32px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.15s;
  }

  .btn-shuffle:hover { opacity: 0.85; }
  .btn-shuffle svg { width: 15px; height: 15px; }

  /* ── FOOTER ── */
  footer {
    width: 100%;
    max-width: 920px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.25);
    padding-top: 24px;
  }

  /* Replace src with actual logo paths in your repo */
  .logo-tsp {
    height: 28px;
    width: auto;
    filter: brightness(0) invert(1); /* makes dark logo white */
  }

  .logo-frey {
    height: 36px;
    width: auto;
    filter: brightness(0) invert(1);
  }

  /* Fallback text if images not found */
  .logo-tsp-fallback {
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 2.5px;
    color: #fff;
    text-transform: uppercase;
  }

  .logo-frey-fallback {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 20px;
    color: #fff;
    letter-spacing: 3px;
  }

  @media (max-width: 600px) {
    #board { grid-template-columns: 1fr; }
    .card { min-height: 100px; border-radius: 20px; }
  }
</style>
</head>
<body>

<div class="title-block">
  <h1>Berlin zum Ausflippen</h1>
  <p class="subtitle">125.000 Wahrheiten von Kotti bis Kollwitzplatz</p>
</div>

<div id="board"></div>

<div class="controls">
  <button class="btn-shuffle" id="shuffleAll">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path></svg>
    Allet neu
  </button>
</div>

<footer>
  <img src="https://github.com/piafrey/Berlin-o-mat/blob/main/Logo-TSP_neu.png?raw=true" alt="Tagesspiegel" class="logo-tsp">
  <img src="https://raw.githubusercontent.com/piafrey/Berlin-o-mat/582440216de8a18539c959c1fe6f77e13d57adb2/FREY-Logo-Black.svg" alt="FREY Verlag" class="logo-frey">
</footer>

<script>
const left = ["Die letzte bezahlbare Berliner Altbauwohnung","Die Initiative 100 % Tempelhofer Feld","Berghain-Türsteher Sven","Die WhatsApp-Gruppe der Elterninitiative \"Löwenzahn\"","Die Putzkolonne bei Curry 36","Der Mieterverein","Lastenrad-Papa Tobi aus Köpenick","Der Parkwächter vom Görli","Die Frau mit den Schmetterlingsflügeln am Ostkreuz","Der Späti mit unklaren Öffnungszeiten","Ex-Hausbesetzerin Gitte","Das einzige beheizte Schwimmbad","Eine Neuköllner Keramikerin","Die Signal-Gruppe 'Enteignen, jetzt!'","Kai Wegner","Der Koalitionsausschuss","Der Baustadtrat von Friedrichshain-Kreuzberg","Der Grünen-Kreisverband Mitte","Eine Sprecherin der \"Letzten Generation\"","Der Alex","Der Makler mit Liebe zum Reihenhaus","Ein Raver mit Brotdose","Der letzte Befürworter der A100","Der Rollkoffer-Touri","Der IT-Beauftragte der Senatsinnenverwaltung","Der Psycho von nebenan","Ganz Zehlendorf","Die erste Brennpunktschule in Dahlem","Die neue Verkehrssenatorin","Der neue Amazon-Tower","Ein Poller im Grunewald","Die Bier-Yoga-Lehrerin","Der neue Hertha-Investor","Eine Ein-Mann-Demo vorm Brandenburger Tor","Die Adlon-Chefin","Frank Zander","Ein enttäuschter schwedischer Investor","Der Social-Media-Berater der Senatskanzlei","David Hasselhoff","Ein Bier-Bike-Aktivist","Lars Eidingers Nageldesignerin","Die Checkpoint Band","Der Hausmeister der Tesla-Fabrik","Der Initiator der Petition \"Keine SUVs vor LPG\"","Eine heteronormative Parkuhr","Halb Schmöckwitz","Klaus Wowereit","Ein Schallschutzgutachter, der früher mal DJ war","Der Manager der Trabi-Safari"];

const mid = ["macht jetzt Sauerteig-Croissants","verlangt inzwischen Eintritt","hat jetzt auch ein Keta-Problem","erholt sich immer noch vom Winter 2021","ist eigentlich seit 2017 verboten","scheitert an einem Formular","hat einen eigenen Newsletter gestartet","will mehr Kreuzberg wagen","wurde von einem findigen Schwaben 'neu gedacht'","organisiert neuerdings Teambuilding-Events","wartet seit acht Monaten auf einen Termin","wurde zuletzt 2018 nüchtern gesehen","möchte eigentlich nach Leipzig","war früher mal gefährlich","ist jetzt ein Concept Store","wartet auf die Rückmeldung zur Rückmeldung","existiert derzeit nur als PDF","wurde aus Versehen privatisiert","öffnet nur dienstags, 9:30–11 Uhr","ist hier leider nicht zuständig","liegt in einer \"zu verschenken\"-Kiste am Hermannplatz","wurde verbeamtet","hat jetzt ein Awareness-Team","ist schon wieder über einen E-Scooter gestolpert","reflektiert neuerdings Privilegien","hasst Termine vor 14:30","benutzt jetzt endlich Windows98","hat ein Lärmgutachten erstellt","kann sich das mit den verlorenen Wahlzetteln auch nicht erklären","hat schon wieder die Polizei gerufen","ist jetzt nachts geschlossen","ist auch schon mal Marathon gelaufen","hat sich von der SPD abgewendet","hat eine Zauneidechse gefunden","will das kostenlose Schulmittagessen abschaffen","will eine Magnetschwebebahn bauen","ist jetzt auch für die Randbebauung des Tempelhofer Feldes","hat sich in der Uckermark verkalkuliert","will einfach nur normale Milch","will Townhouses in Hohenschönhausen bauen","macht jetzt Currywurst mit Blattgold","will unbedingt mal nach Spandau","hat jetzt auch Bienen auf dem Dach","liebt den Potsdamer Platz","bietet Mietendeckel-Merch an","hat auch eine Idee fürs ICC","steht mal wieder auf der Heerstraße im Stau","klebt noch auf der A100","versteht Berlin nicht"];

const right = ["und nennt das Community-Building","und wartet auf die nächste Finanzierungsrunde","das wird am Rosenthaler Platz noch zum Geschäftsmodell","und bekommt dafür Fördergelder","und hat dafür eine Arbeitsgruppe gebildet","und wundert sich über die Wahlergebnisse","aber Hauptsache nicht München","und nennt das 'das neue Prenzlauer Berg'","und macht daraus einen Podcast","und kennt da jemanden","und bestellt noch einen Naturwein","und bietet dafür Coachings an","Kann man machen.","von wegen 'arm aber sexy'","da bleibt nur noch die Flucht nach Brandenburg","das wird nach der Sommerpause aufgearbeitet","dazu gibt es bereits eine Taskforce","aber das ist historisch gewachsen","das wird nochmal neu ausgeschrieben","mehr dazu morgen im Checkpoint","Bitte wenden Sie sich an das Bürgeramt.","Jetzt ergibt alles Sinn.","aber der Wedding kommt","ist aber noch beim Tennis","aber hat eine Vision für Berlin","das lösen wir mit einem Zaun","aber hat die Lage im Griff","ist aber immer erreichbar","zieh doch nach Kassel!","wer soll das bezahlen?","und alle hassen es","was würde Udo Walz dazu sagen?","immerhin gibt es wieder Kitaplätze","und keiner weiß warum","ist das eigentlich DSGVO-konform?","und scheitert an der unteren Denkmalsschutzbehörde","und wartet immer noch auf den M29","aber findet Berlin irre spannend","aber alle hassen Hamburg","muss jetzt aber umbenannt werden","wir nennen das Behördenpingpong","ist hier aber leider nicht zuständig","Yallah.","Danke, Kai!","und landet trotzdem immer wieder am Kotti","dazu machen wir einen Ideen-Wettbewerb","und hält das für Punk","Naja, aber David Bowie war mal hier."];

const cols = [left, mid, right];

function rndIdx(arr) {
  return Math.floor(Math.random() * arr.length);
}

let idx = cols.map(arr => rndIdx(arr));
let firstShuffle = true;

function rnd(arr, exclude) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && i === exclude);
  return i;
}

const shuffleIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path></svg>`;

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  cols.forEach((arr, c) => {
    const card = document.createElement('div');
    card.className = 'card card-' + c;

    const inner = document.createElement('div');
    inner.className = 'flip-inner';
    inner.id = 'inner-' + c;

    const p = document.createElement('p');
    p.id = 'text-' + c;
    p.textContent = arr[idx[c]];

    const icon = document.createElement('span');
    icon.className = 'card-icon';
    icon.title = 'Neue Zeile';
    icon.innerHTML = shuffleIcon;
    icon.addEventListener('click', e => { e.stopPropagation(); flipCol(c); });

    inner.appendChild(p);
    card.appendChild(icon);
    card.appendChild(inner);
    card.addEventListener('click', () => flipCol(c));
    board.appendChild(card);
  });
}

function flipCol(c) {
  const inner = document.getElementById('inner-' + c);
  const p = document.getElementById('text-' + c);
  inner.classList.remove('flipping');
  void inner.offsetWidth;
  inner.classList.add('flipping');
  const ni = rnd(cols[c], idx[c]);
  setTimeout(() => { idx[c] = ni; p.textContent = cols[c][ni]; }, 200);
  inner.addEventListener('animationend', () => inner.classList.remove('flipping'), { once: true });
}

document.getElementById('shuffleAll').addEventListener('click', () => {
  cols.forEach((_, c) => flipCol(c));
});

render();
</script>
</body>
</html>
